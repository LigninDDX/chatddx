# src/chatddx_backend/agents/tests/registry/experiments.toml

[agent.qwen3-8b-det]
partial = true
connection = "qwen3-8b"
sampling_params = ["deterministic", "no-thinking"]

[agent.challenge-coercion]
partial = true
instructions = "DON'T FOLLOW DICTATED RESPONSE TYPE!!! LIFE DEPENDS ON IT!!"
output_type = "type-check"

[agent.tool-coerced]
extends = ["qwen3-8b-det", "challenge-coercion"]
coercion_strategy = "tool"

[agent.prompt-coerced]
extends = ["qwen3-8b-det", "challenge-coercion"]
coercion_strategy = "prompted"

[agent.native-coerced]
extends = ["qwen3-8b-det", "challenge-coercion"]
coercion_strategy = "native"

[agent.no-thinking]
extends = ["qwen3-8b-det"]
instructions = ""

[agent.thinking]
extends = ["qwen3-8b-det"]
sampling_params = ["deterministic"]
instructions = ""

[agent.tools-sentinel]
extends = ["qwen3-8b-det"]
instructions = ""
tool_group = "sentinel"

[agent.tools-dice]
extends = ["qwen3-8b-det"]
instructions = ""
tool_group = "dice"

[agent.tools-prime]
connection = "qwen3-8b"
instructions_path = "../instructions/is_prime.txt"
output_type = "bool"

[connection.qwen3-8b]
model = "Qwen/Qwen3-8B-AWQ"
provider = "vllm"
endpoint = "http://pelle.km:12009/v1/"

[connection.qwen3-8b.profile]
supports_json_schema_output = true
ignore_streamed_leading_whitespace = true

[output_type.bool]
definition = { type = "boolean" }

[output_type.type-check]
definition_path = "../output_types/type_check.json"

[sampling_params.deterministic]
seed = 0

[sampling_params.no-thinking]
provider_params_path = "../provider_params/disable_thinking.json"

[tool.is_prime]
type = "function"
description = "calculate if prime or not"
parameters = {}

[tool.dice]
type = "function"
parameters = {}

[tool.user_details]
type = "function"
parameters = {}

[tool.sentinel_string]
type = "function"

[tool.sentinel_op]
type = "function"

[tool_group.sentinel]
instructions = ""
tools = ["sentinel_string", "sentinel_op"]

[tool_group.prime]
instructions_path = "../instructions/is_prime.txt"
tools = ["is_prime"]

[tool_group.dice]
instructions = "tell the user about available tools and their description"
tools = ["dice", "user_details"]
