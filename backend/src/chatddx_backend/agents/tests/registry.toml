# src/chatddx_backend/agents/tests/registry.toml
[agent.agent-1]
instructions = "hello"
sampling_params = "sampling_params-1"
connection = "connection-1"
output_type = "output_type-1"
tool_group = "tool_group-1"

[agent.test-tools]
connection = "qwen3_8b"
use_tools = true
config = "no-thinking"
tool_group = "dice"

[agent.test-tools-prime]
connection = "qwen3_8b"
use_tools = true
config = "no-thinking"
output_type = "bool"

[agent.ddx-management]
connection = "qwen3_8b"
use_tools = true
config = "no-thinking"
output_type_path = "output_types/ddx_management.json"

[agent.tool-coerced]
coercion_strategy = "tool"

[agent.prompt-coerced]
coercion_strategy = "prompt"

[agent.natively-coerced]
coercion_strategy = "native"

[connection.qwen3_8b]
model = "Qwen/Qwen3-8B-AWQ"
provider = "vllm"
endpoint = "http://pelle.km:12009/v1/"

[connection.connection-1]
model = "Test/test-1"
provider = "vllm"
endpoint = "http://example.com/v1/"

[output_type.output_type-1]
definition_path = "output_types/simple.json"

[output_type.bool]
definition = { type = "bool" }

[sampling_params.sampling_params-1]
temperature = 0.7
max_tokens = 150
stop_sequences = ["\\n\\n", "END"]

[sampling_params.deterministic]
seed = 0

[sampling_params.no-thinking]
provider_params_path = "provider_params/disable_thinking.json"

[session.empty]
description = "empty session"

[tool.tool-1]
type = "function"
description = "Complex parameters"
parameters_path = "output_types/simple.json"

[tool.is_prime]
type = "function"
description = "calculate if prime or not"

[tool_group.tool_group-1]
instructions = "use these tools"
tools = ["tool-1"]

[tool_group.prime]
instructions_path = "instructions/is_prime.txt"
tools = ["is_prime"]

[tool_group.dice]
instructions_path = "instructions/dice_game.txt"
tools = ["dice", "get_player_name"]
