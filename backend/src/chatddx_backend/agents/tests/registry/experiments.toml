# src/chatddx_backend/agents/tests/registry/experiments.toml

[agent.dice-game]
connection = "qwen3_8b"
config = "no-thinking"
instructions_path = "../instructions/dice_game.txt"
tool_group = "dice"

[agent.test-tools-prime]
connection = "qwen3_8b"
config = "no-thinking"
instructions_path = "../instructions/is_prime.txt"
output_type = "bool"

[agent.tool-coerced]
partial = true
coercion_strategy = "tool"

[agent.prompt-coerced]
partial = true
coercion_strategy = "prompt"

[agent.natively-coerced]
partial = true
coercion_strategy = "native"

[connection.qwen3_8b]
model = "Qwen/Qwen3-8B-AWQ"
provider = "vllm"
endpoint = "http://pelle.km:12009/v1/"

[output_type.bool]
definition = { type = "boolean" }

[output_type.ddx-management]
definition_path = "../output_types/ddx_management.json"

[sampling_params.deterministic]
seed = 0

[sampling_params.no-thinking]
provider_params_path = "../provider_params/disable_thinking.json"

[session.empty]
description = "empty session"

[tool.is_prime]
type = "function"
description = "calculate if prime or not"
parameters = {}

[tool.dice]
type = "function"
description = "roll a die"
parameters = {}

[tool.user_details]
type = "function"
description = "get info about user"
parameters = {}

[tool_group.prime]
instructions_path = "../instructions/is_prime.txt"
tools = ["is_prime"]

[tool_group.dice]
instructions_path = "../instructions/dice_game.txt"
tools = ["dice", "user_details"]
