[agent.retry-prompt]
connection = "gpt-oss-20b"
instructions = ""
sampling_params = ["deterministic", "no-thinking"]
output_type = "swift"

[agent.swift]
connection = "qwen3-8b"
instructions = ""
sampling_params = ["deterministic", "no-thinking"]
output_type = "swift"

[agent.ddx-management]
connection = "qwen3-8b"
instructions = ""
sampling_params = ["deterministic", "no-thinking"]
output_type = "ddx-management"

[sampling_params.deterministic]
seed = 0

[sampling_params.no-thinking]
provider_params_path = "./provider_params/disable_thinking.json"

[connection.qwen3-8b]
model = "Qwen/Qwen3-8B-AWQ"
provider = "vllm"
endpoint = "http://pelle.km:12009/v1/"

[connection.qwen3-8b.profile]
supports_json_schema_output = true
ignore_streamed_leading_whitespace = true

[connection.gpt-oss-20b]
model = "openai/gpt-oss-20b"
provider = "openai"
endpoint = "https://tumbling-disparity-upswing.ngrok-free.dev/v1"

[connection.gpt-oss-20b.profile]
supports_json_schema_output = true
ignore_streamed_leading_whitespace = true

[output_type.swift]
definition_path = "./output_types/swift.toml"
coercion_strategy = "prompted"

[output_type.ddx-management]
definition_path = "./output_types/ddx_management.json"
