<span class="inline-flex items-center rounded-md px-2.5 py-0.5 text-xs font-semibold 
  {% if kind == 'prompt' %} bg-primary-50 text-primary-700 dark:bg-primary-800 dark:text-primary-200
  {% elif kind == 'request' %} bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400
  {% elif kind == 'response' %} bg-green-50 text-green-700 dark:bg-green-900/30 dark:text-green-400
  {% elif kind == 'error' %} bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-400
  {% endif %}">
  {{ display_name }}
</span>
