{% extends "admin/change_form.html" %}

{% block after_field_sets %}
    {{ block.super }}
    
    <div class="module custom-messages-section">
        <h2>Messages</h2>
        
        {% for message in related_messages %}
            <div class="message-card">
                {% include "session_message.html" with instance=message %}
            </div>
        {% empty %}
            <p>No messages in this session.</p>
        {% endfor %}
    </div>
{% endblock %}
