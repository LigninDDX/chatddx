[agent.some-agent]
instructions = "some instructions"
connection = "some-connection"
sampling_params = "some-sampling_params"
tool_group = "some-tool_group"
output_type = "some-output_type"

[connection.some-connection]
model = "Some/model"
provider = "vllm"
endpoint = "http://some-host.com/v1/"

[sampling_params.some-sampling_params]
temperature = 1

[tool.some-tool]
type = "function"
command = "some-tool"

[tool.some-tool-2]
type = "function"
command = "some-tool-2"

[tool_group.some-tool_group]
instructions = "some tool group instructions"
tools = ["some-tool", "some-tool-2"]

[output_type.some-output_type]
definition_path = "./output_types/some-output_type.json"
